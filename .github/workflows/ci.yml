name: CI
on: { push: { branches: [main] }, pull_request: { branches: [main] } }
jobs:
  test:
    name: Static contracts + container boot smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Static contract suite
        run: make test
      - name: Strict deploy preflight
        run: python scripts/preflight-deploy.py --strict
      - name: Production container boot + routes
        run: make test-container
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link check
        uses: lycheeverse/lychee-action@v1
        with: { args: "--no-progress --max-concurrency 4 ./**/*.html ./**/*.md" }
        continue-on-error: true
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
