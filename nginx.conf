server {
    listen NGINX_PORT;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml image/jpeg image/png;
    gzip_min_length 1024;

    # Vary tells any CDN / intermediary cache to key on Accept-Encoding.
    # Without it, a proxy that receives a gzipped response can serve it to a
    # client that didn't request gzip encoding. Cheap correctness win — always.
    add_header Vary "Accept-Encoding" always;

    # SECURITY_AUDIT.md § M3-M6 — defense-in-depth headers for the static site.
    # nginx `add_header` inheritance resets whenever a nested location declares
    # any add_header of its own — so the 5 security headers must be repeated in
    # `location = /index.html` below, or they drop off the /index.html response.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    add_header Cache-Control "public, max-age=31536000, immutable" always;
    location = /index.html {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }

    location / {
        # Static marketing site — a missing path is a real 404, not an SPA
        # deep-link that should rewrite to /. Prior `try_files ... /index.html`
        # silently returned 200 on typos + broken inbound links, hurting SEO
        # and burying the fact that a link was wrong.
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
        # nginx add_header inheritance resets on any nested add_header, so the
        # 5 defense-in-depth headers (SECURITY_AUDIT.md § M3-M6) are repeated
        # here — same pattern as `/index.html` / `/robots.txt` / `/sitemap.xml`
        # above. Without this, 404 responses ship no HSTS / XCTO / XFO /
        # Referrer-Policy / Permissions-Policy — an MITM downgrade + iframe
        # spoof surface on every mistyped URL. Locked by tests/test_nginx_headers.py.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # SEO crawler files — 1h cache (server default of 1y immutable is wrong for
    # these; Google Bot re-fetches on its own schedule but downstream CDNs and
    # browsers should not pin them for a year). nginx add_header inheritance
    # resets on any nested add_header, so the 5 defense-in-depth headers
    # (SECURITY_AUDIT.md § M3-M6) are repeated here — same pattern as
    # `/index.html` above.
    location = /robots.txt {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Cache-Control "public, max-age=3600" always;
    }
    location = /sitemap.xml {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Cache-Control "public, max-age=3600" always;
    }
}
