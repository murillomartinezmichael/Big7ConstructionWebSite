    :root {
      --paper: #F5F1EA;
      --ink-500: #4C5258;
      --ink-900: #1A1D22;
      --ink-950: #08090B;
      --accent-600: #B34419;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--paper); color: var(--ink-900);
      font-family: 'Barlow Condensed', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; flex-direction: column; min-height: 100vh;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 96px 24px 48px; flex: 1; }
    .badge {

      font-size: 11px; font-weight: 600; letter-spacing: 0.24em;

    }
    h1 {
      font-family: 'Anton', 'Impact', sans-serif;
      font-size: clamp(56px, 12vw, 128px);
      line-height: 0.95; letter-spacing: -0.01em;
      margin: 12px 0 20px; color: var(--ink-950);
    }
    p {
      font-family: 'Fraunces', Georgia, serif; font-weight: 500;
      font-size: 20px; line-height: 1.5; color: var(--ink-500);
      max-width: 52ch; margin: 0 0 32px;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 22px; text-decoration: none; font-weight: 600;
      font-size: 14px; letter-spacing: 0.06em; text-transform: uppercase;
      background: var(--accent-600); color: #fff; border-radius: 2px;
      transition: filter 0.2s, transform 0.2s;
    }
    .btn:hover { filter: brightness(0.88); transform: translateY(-1px); }
    footer {
      padding: 24px; border-top: 1px solid rgba(0,0,0,0.08);
      font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-500); text-align: center;
